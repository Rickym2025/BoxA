<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR Boss Boxing - Pro Edition</title>
  
  <!-- Tailwind CSS per l'interfaccia -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- A-Frame per il motore 3D e la modalità VR Cardboard -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  
  <!-- MediaPipe Hands per il tracciamento delle mani -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body class="bg-slate-950 text-white font-sans overflow-hidden">

  <!-- ================= SCHERMATA DI CONFIGURAZIONE (2D) ================= -->
  <div id="setup-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center p-6 bg-slate-950">
    <div class="max-w-md w-full bg-slate-900 rounded-2xl p-6 shadow-2xl border border-slate-800 text-center">
      <h1 class="text-3xl font-black text-rose-500 mb-1 tracking-wider">VR BOSS BOXING</h1>
      <p class="text-slate-400 text-xs mb-6">Metti KO il tuo capo in Realtà Virtuale</p>
      
      <!-- Upload Foto -->
      <div class="border-2 border-dashed border-slate-700 rounded-xl p-4 mb-5 hover:border-rose-500 transition-colors bg-slate-950/50">
        <label class="block cursor-pointer">
          <span class="text-xs text-slate-300 block mb-2 font-bold uppercase tracking-wider">Foto del "Capo" (Solo Viso):</span>
          <input type="file" id="image-upload" accept="image/*" class="block w-full text-xs text-slate-500 file:mr-4 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-rose-600 file:text-white hover:file:bg-rose-700 cursor-pointer" />
        </label>
        <div class="mt-3 flex justify-center">
          <img id="preview-img" class="w-20 h-20 object-cover rounded-full border-4 border-rose-500 hidden" alt="Anteprima" />
        </div>
      </div>

      <!-- Opzioni di Gioco -->
      <div class="text-left bg-slate-950 p-4 rounded-xl border border-slate-800 space-y-3 mb-6">
        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Opzioni Calibrazione:</span>
        
        <!-- Toggle Specchio (PC) -->
        <label class="flex items-center space-x-3 cursor-pointer">
          <input type="checkbox" id="mirror-toggle" class="w-4 h-4 rounded text-rose-600 focus:ring-rose-500 bg-slate-800 border-slate-700" checked>
          <span class="text-xs text-slate-300 font-medium">Specchia comandi <b class="text-rose-400">(Consigliato per PC / Webcam frontale)</b></span>
        </label>

        <!-- Toggle Sfondo Trasparente -->
        <label class="flex items-center space-x-3 cursor-pointer">
          <input type="checkbox" id="transparent-toggle" class="w-4 h-4 rounded text-rose-600 focus:ring-rose-500 bg-slate-800 border-slate-700" checked>
          <span class="text-xs text-slate-300 font-medium">Sfondo Trasparente <b class="text-emerald-400">(Vedi la tua stanza reale nel visore)</b></span>
        </label>
      </div>

      <!-- Pulsante Avvia -->
      <button id="start-btn" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-lg shadow-rose-950/50 uppercase tracking-wider text-sm">
        Inizia il Match
      </button>
    </div>
  </div>

  <!-- Fotocamera di sfondo per il Passthrough VR (Realtà Mista) -->
  <video id="webcam" playsinline autoplay muted style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1;"></video>

  <!-- ================= SCENA 3D VR (A-FRAME) ================= -->
  <!-- Utilizziamo "renderer="alpha: true" per permettere la trasparenza dello sfondo -->
  <a-scene id="game-scene" renderer="alpha: true; antialias: true; colorManagement: true;" vr-mode-ui="enabled: true" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: transparent;">
    
    <!-- Elementi Virtuali di Sfondo (Mostrati solo se la trasparenza è disattivata) -->
    <a-entity id="virtual-bg">
      <a-sky color="#090d16"></a-sky>
      <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#111827"></a-plane>
    </a-entity>
    
    <!-- Griglia 3D sul pavimento (Sempre utile per dare il senso dello spazio tridimensionale) -->
    <a-grid color="#334155" width="20" height="20" opacity="0.4"></a-grid>

    <!-- ================= IL MANICHINO DA BOXE (BOB DUMMY) ================= -->
    <a-entity id="boss" position="0 0 -1.7">
      <!-- 1. Base pesante a terra -->
      <a-cylinder position="0 0.08 0" radius="0.45" height="0.16" color="#334155"></a-cylinder>
      
      <!-- 2. Palo metallico di supporto -->
      <a-cylinder position="0 0.6 0" radius="0.04" height="0.9" color="#94a3b8"></a-cylinder>
      
      <!-- 3. Busto atletico nero/grigio -->
      <a-cylinder position="0 1.1 0" radius="0.22" height="0.6" color="#1e293b" scale="1.2 1 0.7"></a-cylinder>
      <!-- Spalle larghe -->
      <a-box position="0 1.3 0" width="0.66" height="0.16" depth="0.24" color="#0f172a"></a-box>
      
      <!-- 4. Collo -->
      <a-cylinder position="0 1.44 0" radius="0.06" height="0.12" color="#94a3b8"></a-cylinder>
      
      <!-- 5. Testa sagomata -->
      <a-box id="boss-head" position="0 1.68 0" width="0.36" height="0.42" depth="0.32" color="#1e293b">
        <!-- Faccia frontale per la foto del capo -->
        <a-plane id="boss-face" position="0 0 0.165" width="0.32" height="0.32" color="#ffffff"></a-plane>
      </a-box>
    </a-entity>

    <!-- ================= I GUANTI VIRTUALI ================= -->
    <a-sphere id="glove-left" radius="0.09" color="#2563eb" position="-0.3 1.2 -1.0" visible="false"></a-sphere>
    <a-sphere id="glove-right" radius="0.09" color="#dc2626" position="0.3 1.2 -1.0" visible="false"></a-sphere>

    <!-- Interfaccia 3D del Punteggio -->
    <a-text id="score-text" value="PUNTI: 0" position="0 2.4 -1.7" align="center" color="#ffffff" width="4" font="mozillavr"></a-text>
    <a-text id="feedback-text" value="" position="0 2.1 -1.7" align="center" color="#fbbf24" scale="1.4 1.4 1.4" visible="false" font="mozillavr"></a-text>

    <!-- Camera VR -->
    <a-entity camera look-controls position="0 1.6 0"></a-entity>
  </a-scene>

  <!-- ================= LOGICA DI GIOCO (JS) ================= -->
  <script>
    const imageUpload = document.getElementById('image-upload');
    const previewImg = document.getElementById('preview-img');
    const startBtn = document.getElementById('start-btn');
    const setupScreen = document.getElementById('setup-screen');
    const gameScene = document.getElementById('game-scene');
    const videoElement = document.getElementById('webcam');
    const mirrorToggle = document.getElementById('mirror-toggle');
    const transparentToggle = document.getElementById('transparent-toggle');
    const virtualBg = document.getElementById('virtual-bg');
    
    let uploadedImageSrc = "";
    let score = 0;
    let canHit = true;
    let audioCtx = null;

    // Posizioni smorzate per evitare tremolii (Filtro Lerp)
    let gloveLeftPos = { x: -0.3, y: 1.2, z: -1.0 };
    let gloveRightPos = { x: 0.3, y: 1.2, z: -1.0 };
    const LERP_FACTOR = 0.35; // Regola la fluidità (più basso = più fluido, più alto = più immediato)

    // Posizioni del frame precedente per calcolare la velocità del pugno
    let lastLeftPos = { x: 0, y: 0 };
    let lastRightPos = { x: 0, y: 0 };

    // Gestione upload foto
    imageUpload.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          uploadedImageSrc = event.target.result;
          previewImg.src = uploadedImageSrc;
          previewImg.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      }
    });

    // Avvio del Gioco
    startBtn.addEventListener('click', async function() {
      if (!uploadedImageSrc) {
        alert("Carica la foto del tuo capo prima di iniziare!");
        return;
      }

      // Inizializza l'audio del browser
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      // Applica la foto sul viso del manichino
      document.getElementById('boss-face').setAttribute('material', 'src', uploadedImageSrc);

      // Gestione dello sfondo trasparente (Passthrough) o virtuale
      if (transparentToggle.checked) {
        virtualBg.setAttribute('visible', 'false'); // Nasconde cielo e pavimento virtuale
        videoElement.style.display = 'block';       // Mostra la videocamera reale sullo sfondo
      } else {
        virtualBg.setAttribute('visible', 'true');
        videoElement.style.display = 'none';        // Videocamera nascosta (usata solo in background per tracciare)
      }

      setupScreen.style.display = 'none';
      gameScene.style.display = 'block';

      // Avvia fotocamera (usa 'environment' per quella posteriore, utile in VR)
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: 640, height: 480 }
        });
        videoElement.srcObject = stream;
        videoElement.addEventListener('loadeddata', startHandTracking);
      } catch (err) {
        alert("Impossibile accedere alla fotocamera: " + err.message);
      }
    });

    // Suono 8-bit procedurale del pugno
    function playPunchSound() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(140, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.15);
      
      gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(audioCtx.currentTime + 0.15);
    }

    // Configurazione MediaPipe Hands
    function startHandTracking() {
      const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
      });

      hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });

      hands.onResults(onHandResults);

      async function predict() {
        await hands.send({ image: videoElement });
        requestAnimationFrame(predict);
      }
      predict();
    }

    // Processamento coordinate mani
    function onHandResults(results) {
      const gloveLeft = document.getElementById('glove-left');
      const gloveRight = document.getElementById('glove-right');

      gloveLeft.setAttribute('visible', 'false');
      gloveRight.setAttribute('visible', 'false');

      if (results.multiHandLandmarks && results.multiHandedness) {
        for (let i = 0; i < results.multiHandLandmarks.length; i++) {
          const landmarks = results.multiHandLandmarks[i];
          const handedness = results.multiHandedness[i].label; // "Left" o "Right"
          const handPos = landmarks[9]; // Usiamo il nodo centrale del palmo

          // Calcolo X: Gestione opzione specchio per PC
          let rawX = handPos.x;
          if (mirrorToggle.checked) {
            rawX = 1 - handPos.x; // Inverte l'asse X per riflettere i movimenti reali
          }
          const targetX = (rawX - 0.5) * 3;

          // Calcolo Y: Asse verticale
          const targetY = (0.5 - handPos.y) * 2 + 1.6;

          // Calcolo Z (Distanza visuale): Stimato in base alla dimensione della mano
          const dx = landmarks[0].x - landmarks[9].x;
          const dy = landmarks[0].y - landmarks[9].y;
          const handSize = Math.sqrt(dx*dx + dy*dy);
          const clampedSize = Math.max(0.08, Math.min(0.22, handSize));
          const normalizedSize = (clampedSize - 0.08) / (0.22 - 0.08); 
          const targetZ = -1.7 + (normalizedSize * 0.9); // Da -1.7 (disteso) a -0.8 (vicino)

          // Applica il filtro Lerp (smorzamento) per eliminare il tremolio
          const activeGlove = (handedness === 'Left') ? gloveLeft : gloveRight;
          let smoothPos = (handedness === 'Left') ? gloveLeftPos : gloveRightPos;

          smoothPos.x = smoothPos.x + (targetX - smoothPos.x) * LERP_FACTOR;
          smoothPos.y = smoothPos.y + (targetY - smoothPos.y) * LERP_FACTOR;
          smoothPos.z = smoothPos.z + (targetZ - smoothPos.z) * LERP_FACTOR;

          activeGlove.setAttribute('visible', 'true');
          activeGlove.setAttribute('position', `${smoothPos.x} ${smoothPos.y} ${smoothPos.z}`);

          // Calcolo della velocità (X e Y) per capire se è stato sferrato un pugno rapido
          const lastPos = (handedness === 'Left') ? lastLeftPos : lastRightPos;
          const vx = targetX - lastPos.x;
          const vy = targetY - lastPos.y;
          const speed = Math.sqrt(vx*vx + vy*vy);

          // Salva posizione attuale per il prossimo calcolo
          if (handedness === 'Left') {
            lastLeftPos = { x: targetX, y: targetY };
          } else {
            lastRightPos = { x: targetX, y: targetY };
          }

          // NUOVO SISTEMA DI COLLISIONE: Basato su sovrapposizione 2D + Velocità pugno
          // La testa del manichino è a coordinate X=0, Y=1.68
          if (canHit && speed > 0.12) { // Soglia di velocità del pugno
            const distToHead = Math.sqrt(Math.pow(targetX - 0, 2) + Math.pow(targetY - 1.68, 2));
            
            // Se il pugno è scagliato velocemente entro un raggio di 42cm dal viso
            if (distToHead < 0.42) {
              triggerHit();
            }
          }
        }
      }
    }

    // Registra il colpo andato a segno
    function triggerHit() {
      canHit = false;
      score++;
      document.getElementById('score-text').setAttribute('value', `PUNTI: ${score}`);
      
      playPunchSound();

      // Animazione di impatto: La testa del manichino diventa rossa e trema
      const bossHead = document.getElementById('boss-head');
      bossHead.setAttribute('color', '#ef4444');

      let shakeCount = 0;
      const originalPos = "0 1.68 0";
      const shakeInterval = setInterval(() => {
        if (shakeCount > 4) {
          clearInterval(shakeInterval);
          bossHead.setAttribute('position', originalPos);
          bossHead.setAttribute('color', '#1e293b');
          canHit = true;
        } else {
          const offsetX = (Math.random() - 0.5) * 0.12;
          const offsetY = 1.68 + (Math.random() - 0.5) * 0.12;
          bossHead.setAttribute('position', `${offsetX} ${offsetY} 0`);
          shakeCount++;
        }
      }, 50);

      // Scritta flash sullo schermo
      const feedback = document.getElementById('feedback-text');
      const textOptions = ["SBAM!", "STRIKE!", "K.O.!", "POW!", "BOOM!"];
      const randomText = textOptions[Math.floor(Math.random() * textOptions.length)];
      feedback.setAttribute('value', randomText);
      feedback.setAttribute('visible', 'true');
      setTimeout(() => {
        feedback.setAttribute('visible', 'false');
      }, 600);
    }
  </script>
</body>
</html>
